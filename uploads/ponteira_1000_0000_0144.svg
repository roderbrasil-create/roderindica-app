<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <rect width="100%" height="100%" fill="white"/>
  <g fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top base plate -->
    <polygon points="210,130 380,50 380,80 210,160" />
    <polygon points="380,50 340,30 170,110 210,130" />
    
    <!-- Top bolts -->
    <!-- Bolt 1 (top left) -->
    <ellipse cx="225" cy="115" rx="8" ry="4" />
    <line x1="225" y1="119" x2="225" y2="125" />
    <ellipse cx="225" cy="125" rx="8" ry="4" />
    <!-- Bolt 2 (top right) -->
    <ellipse cx="320" cy="70" rx="8" ry="4" />
    <line x1="320" y1="74" x2="320" y2="80" />
    <ellipse cx="320" cy="80" rx="8" ry="4" />
    <!-- Bolt 3 (bottom left) -->
    <ellipse cx="270" cy="135" rx="8" ry="4" />
    <line x1="270" y1="139" x2="270" y2="145" />
    <ellipse cx="270" cy="145" rx="8" ry="4" />
    <!-- Bolt 4 (bottom right) -->
    <ellipse cx="362" cy="90" rx="8" ry="4" />
    <line x1="362" y1="94" x2="362" y2="100" />
    <ellipse cx="362" cy="100" rx="8" ry="4" />

    <!-- Main Arm Box Body -->
    <path d="M 170,110 L 110,195 L 85,250 L 50,230 L 40,250 L 105,330" />
    <path d="M 210,130 L 105,330 L 420,535 L 530,345" />
    <path d="M 380,80 L 530,345 L 610,310 L 635,340" />
    <path d="M 105,330 L 420,530" />

    <!-- Weld lines and structural bands -->
    <path d="M 270,225 L 340,300" stroke-dasharray="2,2" />
    <path d="M 340,300 L 435,250" />
    <path d="M 340,300 L 305,435" />
    <path d="M 305,435 L 435,395" />
    
    <!-- Link cylinder / pin connector on top arm -->
    <path d="M 160,285 C 150,285 140,295 140,310 C 140,325 150,335 160,335 C 170,335 180,325 180,310 C 180,295 170,285 160,285 Z" />
    <path d="M 160,293 C 155,293 150,298 150,310 C 150,322 155,327 160,327 C 165,327 170,322 170,310 C 170,298 165,293 160,293 Z" />
    <line x1="160" y1="285" x2="225" y2="350" stroke-dasharray="1,1" />

    <!-- Hanging arm connection loop at the bottom-right -->
    <path d="M 585,550 L 585,730 C 585,760 625,780 655,780 C 685,780 725,760 725,730 L 725,550 Z" />
    <!-- Outer cylinder end ring -->
    <ellipse cx="655" cy="730" rx="40" ry="25" />
    <!-- Pin hole at the bottom arm -->
    <ellipse cx="655" cy="730" rx="20" ry="12" />
    <ellipse cx="655" cy="580" rx="15" ry="8" />

    <!-- Reinforcement plate and pin -->
    <path d="M 520,580 L 585,550 C 585,550 630,520 635,505 C 640,490 620,470 600,470 L 460,470 Z" />
    <!-- Pivot hub -->
    <ellipse cx="600" cy="495" rx="25" ry="15" />
    <ellipse cx="600" cy="495" rx="12" ry="7" />

    <!-- Cable loop bracket on arm -->
    <path d="M 470,330 C 470,300 520,300 520,330" />
    <path d="M 465,335 C 465,290 525,290 525,335" />
  </g>
</svg>
