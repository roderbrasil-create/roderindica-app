<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RODER Indica V2</title>
    <!-- Cache Busting Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <link rel="icon" type="image/png" href="https://roderbrasil.com.br/wp-content/uploads/2024/05/favicon.png" />
    <link rel="apple-touch-icon" href="https://roderbrasil.com.br/wp-content/uploads/2024/05/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RODER Brasil" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f97316" />
    <script>
      (function() {
        // Unregister service workers immediately in development to prevent caching issues/blank screens
        // We keep it disabled on localhost and active dev sandbox, but allow it on preview/production (ais-pre and cloud run urls)
        var isDev = window.location.hostname.includes('ais-dev') || 
                     window.location.hostname.includes('localhost') || 
                     window.location.hostname.includes('127.0.0.1');
        
        if (isDev && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister().then(function(success) {
                if (success) {
                  console.log('[DevHelper] ServiceWorker unregistered successfully');
                }
              });
            }
          }).catch(function(err) {
            console.error('[DevHelper] Error unregistering ServiceWorker:', err);
          });
        }

        // Force refresh if version mismatch (simple versioning)
        var CURRENT_VERSION = '2.4.0'; // Match APP_VERSION in App.tsx
        var savedVersion = localStorage.getItem('app_version');
        if (savedVersion !== CURRENT_VERSION) {
          localStorage.setItem('app_version', CURRENT_VERSION);
          // Only reload if it was already loaded once to avoid loops
          if (savedVersion) {
            window.location.reload(true);
          }
        }

        try {
          var theme = localStorage.getItem('theme');
          var supportDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && supportDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#050505';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
